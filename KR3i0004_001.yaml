body:
  text: 歙州硯譜宋唐積撰採發第一婺源硯在唐開元中獵人葉氏逐獸至長城里見疊石如城壘狀瑩潔可愛因攜以歸刋粗成硯溫潤大過端溪後數世葉氏諸孫持以與令令愛之訪得匠手斫為硯由是山下始傳至南唐元宗精意翰墨歙守又獻硯并斫硯工李少微國主嘉之擢為硯官今石工周全師之爾後匠者增益頗多今全最髙年能道昔時事并召少微孫明今家濟源訪僞誥不獲傳多如此今山下葉氏繁息幾數百户乃獵者之孫石坑第二羅紋山亦曰芙蓉溪硯坑十餘處蔓延百餘里皆山前後㳂溪所生溪水中殊無石好事者相傳多云水中石又見蘇易簡硯譜云歙州龍尾山石亦端溪之亞訪於彼俗雖有龍尾山而山實無石蓋好事者取其美名以咤於世今次其石品與地坑之名如後眉子坑在羅紋山開元中發屬程於地從溪下至取石處九丈五尺其濶二丈六尺深一丈三尺坑皆無土相雜羅紋裏山坑在羅紋山後李氏時發今廢五十餘年名色未詳羅紋坑在眉子坑之東李氏時發地向屬王仁髙今絶籍為硯户戴義八人共請之歲輸山稅三十金自山下至取石處計七十五丈濶十八丈深十五丈三尺石藏土中今土深三四丈乃至石也見石處謂之寨頭也水舷坑在眉子坑外臨溪冬水涸時方可取春夏不可得發地丈餘乃至石率多金花眉子地屬程於水蕨坑在羅紋山西北地屬王十五景祐中發今廢四十年自水舷至坑五丈五尺濶一丈三尺穿籠取之久廢不可得蓋石工不知攻取法石理如浪紋溪頭坑又曰主持山在羅紋山金星坑之北約二三里廢已二十年不取其石金星率多虛慢焉葉九山坑在溪頭坑之西約一里不取已三十年有眉子石紋粗慢與溪頭相次也羅紋金星坑在羅紋山西北自羅紋坑相去四十五丈今廢不取蓋工用多所得少也驢坑在縣之西北七十里屬詹觀景祐中曹平為令時取之後王君玉為守又取之近嘉祐中刁璆為尉又取之其石有青緑暈也濟源坑在縣之正北凡三坑並列曰碧裏坑在山上色理青瑩及半里有水步石大雨㸃白暈次十里入裏山石青細有金紋花暈厥狀不常洞靈巖在縣西北一百二十里三洞相連石産巖之左右無定處材璞至少而瑕脉多或有絶病瑩淨者可擬端溪之品而石理燥慢浙石屬衢州開化縣俗謂之玳瑁石其紋正如玳瑁傍視則有波紋者可為碑材帛砧柱礎之類至易得攻取第三凡取石先具牲醪祝版擇日齊戒至山下設神位十餘於壇墠之上祝訖發之若稍褻慢必有蜂蠆蟲蟒毒物傷人之患立出蓋山川神物所擁護祕惜尤不欲廣傳人間所得不過百十枚即竭矣又當再祝之前後被囓死者十餘人今皆預祝饗也冀其隂助不得不愛重之品目第四眉子石其紋七種金星地眉子對眉子短眉子長眉子簇眉子闊眉子金眉子外山羅紋其紋十三種粗羅紋細羅紋古犀羅紋角浪羅紋金星羅紋松紋羅紋石心羅紋金暈羅紋絞絲羅紋刷絲羅紋倒理羅紋烏釘羅紋卵石羅紋裏山羅紋一等金星疏慢金星其紋三種葵花金暈金星驢坑一等青色緑暈洞靈巖紫石大小者如肝色今産孚梁縣巖嶺處處有其匠者或琢為茶甌凌冬不可用也浙石一等紋如玳瑁斑水舷金紋厥狀十種金紋如長壽仙人者青斑金紋如鶴舞者金紋如雙鴛鴦者金紋如斗者金紋如枯槎仙人者如金雲氣者眉如卧蠶者如雙魚蹲鴟者金紋如湖中寒鴈者如金壺瓶者余常見之修斫第五硯斫初成先以蠟塗內外蓋與石相益須借此則溫潤光潔可愛於石殊無損而便於洗濯不惹墨漬初便以生薑汁塗研處即著墨今人多不知此云是瑕病以墨蠟蓋滅痕璺又云不發墨光始初磨墨兼帶少蠟滯暗墨色故也使三五度則無此病矣又出墨色者便使益好多漬難愛護欲著手氣必成痕迹故人多用蠟蓋免此患也硯須每日洗浣去其積墨敗水則墨光瑩澤也名狀第六端樣舍人樣都官樣玉堂樣月樣方月樣龍眼樣圭樣方龍眼樣瓜樣方葫蘆樣八角辟雍樣方辟雍樣馬蹄樣新月樣𨫼樣眉心樣石心樣瓢樣天池樣科斗樣銀鋌樣蓮葉樣人面樣毬頭樣寶瓶樣笏頭樣風字樣古錢樣外方裏圓筒硯樣蟾蜍樣辟雍樣方玉堂樣尹氏樣蝦䗫樣犀牛樣鸚鵡樣琴樣龜樣已上並擇取樣製古雅者繪之於圗餘數名雖多種狀樣都俗也不取石病第七雞腳如麻石黯色類雞腳印行迹烏肫有痕如木葉若肉中之脞也隔路如墨痕如蚓跡行路浪痕偏纒如細帛紋其色或淺或深墨色贅子若烏豆狀隱起礙手靸藏於石中或開之乃有大璺搭線斜紋若硯斷硬線有起處隱手名工亦不能礪平也斷紋有紋兩不相著石上有微塵孔者乃石之膚也黃爛者土中石皮也道路第八自歙州大路一百八十里至西坑口入山三十里至羅紋山皆山谷大林莽盤屈鳥道也自婺源縣大路三十里過溪皆大嶺重復九十里至羅紋山下自州至濟源口一百九十里入小路七十里至濟源自縣至濟口八十里入小路七十里至濟源匠手第九縣城三姓四家一十一人劉大名福誠第三第四第五第六周四名全年七十周二名進誠周小四周三名進昌劉二無官名朱三名明靈屬里一姓三家六人戴二名義和第三第五第六戴大名文宗戴四名義誠大容里濟口三姓四人方七名守宗男慶子胡三名嵩興汪大號汪王二攻器第十箕畚銃鐵大小鎚長短鑿鋼屑鐓頭鴉觜鋤木􅱾大宋治平丙午嵗重九日歙州硯譜
